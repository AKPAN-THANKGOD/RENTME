<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Booking - Rent Me Naija</title>
    <link rel="icon" type="image/png" href="assets/images/rentme favicon.png" />
    <link rel="stylesheet" href="assets/Fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="css/hotel-info2.css" />
  </head>
  <body>
    <div class="top">
      <i class="fas fa-arrow-left"></i>
    </div>

    <!-- hero section -->
    <section class="hotel-pic">
      <div class="slide"></div>
      <div class="symbol1">
        <span id="counter">1 / 4</span>
      </div>
      <div class="symbol2">
        <span> <i class="fas fa-chevron-left"></i></span>
        <span><i class="fas fa-chevron-right"></i></span>
      </div>
      <div class="symbol3">
        <span>available</span>
        <i class="fas fa-check-circle"></i>
      </div>
    </section>
    <!-- hero section -->

    <!-- info -->
    <div id="room" class="room">
      <div id="room-pic" class="room-pic"></div>
      <div id="room-info" class="room-info">
        <p id="room-name">Deluxe King Room</p>
        <span id="room-quality" class="room-quality">
          <span>
            <p>Max-Guest:</p>
            <p>2</p>
          </span>
          <span>
            <p>Bed Config:</p>
            <p>1 King Bed</p>
          </span>
          <span id="amenities" class="amenities">
            <p>Room Amenities:</p>
            <p>TV,Balcony,Air Conditioning</p>
          </span>
        </span>

        <span id="room-price" class="room-price"></span>
        <div id="room-available" class="room-available"></div>
        <div class="guidelines">
          <span>Guest guidelines</span>
          <span>
            <ul>
              <li>No Smoking</li>
              <li>ID required at check</li>
            </ul>
          </span>
        </div>
        <div id="cancellation">
          <span>Cancellation Policy</span>
          <span>Free up to 14hrs</span>
        </div>
        <div class="c11"><span class="continue">Continue</span></div>
      </div>
    </div>
    <!-- info -->

    <script src="js/hotel-info2.js"></script>
  </body>
</html>
