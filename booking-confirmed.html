<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Booking - Rent Me Naija</title>
    <link rel="icon" type="image/png" href="assets/images/rentme favicon.png" />
    <link rel="stylesheet" href="assets/Fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="css/booking-confirmed.css" />
  </head>
  <body>
    <section class="top">
      <i class="fas fa-times"></i>
    </section>
    <section class="aa1">
      <div class="alpha">
        <i class="fas fa-check-circle"></i>
        <span class="alpha1">Booking Confirmed!</span>
        <span class="alpha2"
          >Your booking order has been successfully completed</span
        >
        <div class="alpha3">
          <span class="alpha31">
            <p>Hotel:</p>
            <p>Grand Plaza Hotel</p>
          </span>
          <span class="alpha31">
            <p>Room:</p>
            <p>Deluxe King Room</p>
          </span>
          <span class="alpha31">
            <p>Date:</p>
            <p>December 16, 2025 - December 17, 2025</p>
          </span>
          <span class="alpha31">
            <p>Duration:</p>
            <p>2 Nights</p>
          </span>
          <span class="alpha31">
            <p>Total Paid:</p>
            <p>N30,000</p>
          </span>
          <span class="alpha31">
            <p>Booking ID:</p>
            <p>BK-2025-7890</p>
          </span>
        </div>
        <div class="bottom-options">
          <p>View Booking Details</p>
          <p>Book Another Stay</p>
        </div>
      </div>
    </section>
    <script src="js/booking-confirmed.js"></script>
  </body>
</html>
